<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Nilex - Egypt's Marketplace for Cars & Real Estate</title>
    <meta name="description" content="Buy and sell cars, apartments, electronics and more across Egypt. Nilex is the trusted classifieds marketplace." />
    <meta name="author" content="Nilex" />

    <meta property="og:title" content="Nilex - Egypt's Marketplace" />
    <meta property="og:description" content="Buy and sell cars, real estate, electronics and more across Egypt." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <script>
      // No-flash theme apply
      try {
        var s = JSON.parse(localStorage.getItem('nilex.appearance') || '{}');
        var mode = s.dark_mode || 'system';
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = mode === 'dark' || (mode === 'system' && sysDark);
        var r = document.documentElement;
        if (dark) r.classList.add('dark');
        if (s.high_contrast) r.classList.add('high-contrast');
        if (s.reduced_motion) r.classList.add('reduced-motion');
        if (s.font_size) r.setAttribute('data-font-size', s.font_size);
        if (s.density) r.setAttribute('data-density', s.density);
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
